<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="header">
        <h1>PathForge</h1>
        <h2>Track Habits, Goals, Progress</h2>
    </div>
    
    <div id="content">
        <ul id="habitList">Habits
            <button id="createHabit">Create habit</button>
        </ul>


        <ul id="goalList">Goals for 2026
            <button id="createGoal">Create goal</button>
        </ul>
    </div>

    <div id="buttons">
        <button id="save">Save Day</button>
        <button id="clearRecords">Clear Records</button>
        <button id="clearHabits">Clear Habits</button>
        <button id="removeGoal">Remove Last Goal</button>
    </div>  
          
    <div id="result"></div>




    <script src="javascropt.js"></script>
</body>
</html>
